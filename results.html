<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PagePilot Capture — Preview</title>
  <link rel="stylesheet" href="results.css" />
</head>
<body>

  <div id="app">

    <!-- ── Top Header ──────────────────────────────────────────────────────── -->
    <header class="pp-header">
      <div class="pp-header-left">
        <svg class="pp-logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        <span class="pp-brand">PagePilot Capture</span>
      </div>
      <div class="pp-header-meta" id="pageMeta">
        <span class="pp-meta-title" id="pageTitle" title=""></span>
        <span class="pp-meta-sep" aria-hidden="true">·</span>
        <a  class="pp-meta-url"   id="pageUrl"   href="#" target="_blank" rel="noopener noreferrer"></a>
        <span class="pp-meta-sep" aria-hidden="true">·</span>
        <span class="pp-meta-time" id="captureTime"></span>
      </div>
    </header>

    <!-- ── Action Toolbar ─────────────────────────────────────────────────── -->
    <div class="pp-toolbar" id="toolbar">
      <div class="pp-actions">

        <!-- Primary action -->
        <button class="pp-btn pp-btn--primary" id="btnDownloadPng" disabled aria-label="Download PNG">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Download PNG
        </button>

        <button class="pp-btn pp-btn--secondary" id="btnExportPdf" disabled aria-label="Export PDF">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
          Export PDF
        </button>

        <button class="pp-btn pp-btn--secondary" id="btnCopyClipboard" disabled aria-label="Copy image to clipboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          Copy Image
        </button>

        <button class="pp-btn pp-btn--ghost" id="btnCaptureAgain" aria-label="Close preview and capture again">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 .49-3.54"/>
          </svg>
          Capture Again
        </button>

        <!-- ── Bonus: Site Audit Placeholder ──────────────────────────────── -->
        <!--
          Hidden by default. Shown when the "enableSiteAudit" flag is set in
          chrome.storage.local. Not yet implemented — wired for future expansion.
        -->
        <button class="pp-btn pp-btn--audit" id="btnSiteAudit" disabled aria-label="Run a quick site audit on this page">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            <line x1="11" y1="8" x2="11" y2="14"/>
            <line x1="8" y1="11" x2="14" y2="11"/>
          </svg>
          Run Site Audit
        </button>

      </div>

      <div class="pp-status-wrap">
        <span class="pp-status-dot" id="statusDot" aria-hidden="true"></span>
        <span class="pp-status" id="statusText" role="status" aria-live="polite">Connecting…</span>
      </div>
    </div>

    <!-- ── Preview Area ───────────────────────────────────────────────────── -->
    <main class="pp-preview-area" id="previewArea">

      <!-- Loading spinner (visible while stitching) -->
      <div class="pp-loading" id="loadingSpinner">
        <div class="pp-spinner" aria-hidden="true"></div>
        <p class="pp-loading-label" id="loadingText">Preparing your screenshot…</p>
      </div>

      <!-- Error state -->
      <div class="pp-error-box" id="errorBox" style="display:none" role="alert">
        <svg class="pp-error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <p class="pp-error-heading">Capture failed</p>
        <p class="pp-error-msg" id="errorMsg"></p>
        <button class="pp-btn pp-btn--primary" id="btnErrorRetry">
          Try Again
        </button>
      </div>

      <!-- Screenshot canvas (hidden until stitching complete) -->
      <div class="pp-canvas-wrapper" id="canvasWrapper" style="display:none">
        <div class="pp-canvas-stack">
          <canvas id="previewCanvas" aria-label="Full-page screenshot preview"></canvas>
          <!-- Overlay canvas: drawn above previewCanvas; shows the fold line.
               pointer-events:none so mouse/click events pass through to previewCanvas. -->
          <canvas id="overlayCanvas" aria-hidden="true"></canvas>
        </div>
      </div>

      <!-- Audit panel (shown below canvas after a Site Audit run) -->
      <div class="pp-audit-panel" id="auditPanel" style="display:none" aria-live="polite">
        <!-- Summary bar (score + counts) is injected here by results.js -->
        <div class="pp-audit-header" id="auditHeader"></div>
        <!-- Grouped check cards are injected here by results.js -->
        <div class="pp-audit-sections" id="auditSections"></div>
      </div>

    </main>

    <!-- ── Footer ─────────────────────────────────────────────────────────── -->
    <footer class="pp-footer">
      <span id="dimensionInfo" class="pp-footer-dims"></span>
    </footer>

  </div><!-- /#app -->

  <script src="results.js"></script>
</body>
</html>
